# VirtualHost — comprasbi.mogidascruzes.sp.gov.br
# Padrão protocolo-sei: apenas *:80 (sem SSL neste vhost → evita ERR_TOO_MANY_REDIRECTS).
# TLS, se existir, deve terminar no balanceador/CDN e chegar aqui em HTTP com
# X-Forwarded-Proto (ajuste Django USE_TLS / CSRF conforme o caso).
#
# Módulos: sudo a2enmod proxy proxy_http headers rewrite
#
# Instalação: sudo bash /var/www/compras/deploy/install-comprasbi-server.sh

<VirtualHost *:80>
    ServerName comprasbi.mogidascruzes.sp.gov.br

    ErrorLog ${APACHE_LOG_DIR}/comprasbi_error.log
    CustomLog ${APACHE_LOG_DIR}/comprasbi_access.log combined

    ProxyPreserveHost On

    # TLS costuma terminar no balanceador: o Django precisa ver HTTPS e um Host limpo.
    # Remove X-Forwarded-Host errado (causa DisallowedHost → 400 no /admin/).
    RequestHeader unset X-Forwarded-Host
    RequestHeader set X-Forwarded-Proto "https"

    # Frontend (Vue) — SPA
    DocumentRoot /var/www/compras/frontend/dist
    <Directory /var/www/compras/frontend/dist>
        Require all granted
        Options FollowSymLinks
        AllowOverride None
    </Directory>

    RewriteEngine On
    RewriteCond %{REQUEST_URI} ^/api/
    RewriteRule ^ - [L]

    # Estáticos do Django (admin)
    Alias /static/ /var/www/compras/staticfiles/
    <Directory /var/www/compras/staticfiles>
        Require all granted
        Options FollowSymLinks
        AllowOverride None
    </Directory>

    # Se não for arquivo/diretório existente, serve o index.html (SPA).
    # Exclui /branding/ e /favicon.ico: se faltar ficheiro no dist, 404 em vez de HTML (evita ícones/brasão “partidos”).
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteCond %{REQUEST_URI} !^/assets/
    RewriteCond %{REQUEST_URI} !^/admin/
    RewriteCond %{REQUEST_URI} !^/static/
    RewriteCond %{REQUEST_URI} !^/favicon\.ico
    RewriteCond %{REQUEST_URI} !^/branding/
    RewriteCond %{REQUEST_URI} !^/icons\.svg
    RewriteRule ^ /index.html [L]

    AllowEncodedSlashes NoDecode
    ProxyPass        /api/ http://127.0.0.1:8001/api/
    ProxyPassReverse /api/ http://127.0.0.1:8001/api/
    ProxyPass        /admin/ http://127.0.0.1:8001/admin/
    ProxyPassReverse /admin/ http://127.0.0.1:8001/admin/
</VirtualHost>
